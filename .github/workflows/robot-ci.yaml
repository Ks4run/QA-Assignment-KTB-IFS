name: Robot CI

on:
  schedule:
    - cron : 0 23 * * 0,2,4,6
  
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  robot-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run rfbrowser init

      - name: Run Robot tests
        run: uv run robot -d results tests/
        continue-on-error: true

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: robot-report
          path: results

  publish-report:
    needs: robot-test
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: robot-report
          path: results

      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./results

      - name: Add report link to summary
        run: |
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/report.html"

          echo "## 🤖 Robot Framework Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Report URL:" >> $GITHUB_STEP_SUMMARY
          echo "$REPORT_URL" >> $GITHUB_STEP_SUMMARY
