name: Robot CI

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  robot-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install dependencies
        run: |
          uv sync

      - name: Install Playwright browsers
        run: |
          uv run rfbrowser init

      - name: Run Robot tests
        run: |
          uv run robot -d results tests/

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: robot-report
          path: results

      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./results/report.html

      - name: Echo report URL
        run: |
          echo "Robot Report URL:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/report.html"
